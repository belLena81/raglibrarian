syntax = "proto3";

package auth.v1;

option go_package = "github.com/belLena81/raglibrarian/pkg/proto/auth;authpb";

// AuthService is consumed by Metadata and Retrieval services to validate
// tokens arriving on inbound gRPC calls without each service needing to
// hold the PASETO symmetric key.
// Query Service implements this server; other services are clients.
service AuthService {
  // ValidateToken checks a PASETO token and returns the embedded claims.
  // Returns UNAUTHENTICATED when the token is missing, expired, or invalid.
  // Returns PERMISSION_DENIED when the caller's role is insufficient.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string token = 1; // raw PASETO token string, no "Bearer " prefix
}

message ValidateTokenResponse {
  string    user_id = 1; // UUID as string
  string    email   = 2;
  Role    role    = 3; // "reader" | "librarian" | "admin"
  enum Role {
    Admin = 0;
    Librarian = 1;
    Reader = 2;
  }
}
