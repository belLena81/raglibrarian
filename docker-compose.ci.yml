services:
  edge-api:
    environment:
      EDGE_INSECURE_REFRESH_COOKIE: "true"

  edge-api-2:
    environment:
      EDGE_INSECURE_REFRESH_COOKIE: "true"

  text-embeddings-inference:
    image: raglibrarian-tei-stub:local
    build:
      context: .
      target: retrieval-runtime
      args:
        SERVICE: retrieval-service
        SERVICE_COMMAND: cmd/tei_stub
    environment:
      HEALTHCHECK_HTTP_URL: http://127.0.0.1:8080/health
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    command: []
    volumes:
      - m5_ci_empty_model:/data/model:ro
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 128
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 5s

volumes:
  m5_ci_empty_model:
