x-service-hardening: &service-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - DAC_READ_SEARCH
    - SETGID
    - SETUID
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=32m

x-job-hardening: &job-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - DAC_READ_SEARCH
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=32m

services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_USER: raglibrarian_bootstrap
      POSTGRES_DB: raglibrarian_platform
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raglibrarian_bootstrap -d raglibrarian_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-db-bootstrap:
    <<: *job-hardening
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: raglibrarian_platform
      PGUSER: raglibrarian_bootstrap
      PGPASSFILE: /run/secrets/postgres_pgpass
      BOOTSTRAP_SQL_FILE: /bootstrap/core-init.sql
      BOOTSTRAP_COMPLETE_MESSAGE: Identity, Catalog, and Ingestion database roles and privileges are ready
    secrets:
      - postgres_pgpass
      - identity_migration_password
      - identity_runtime_password
      - catalog_migration_password
      - catalog_runtime_password
      - ingestion_migration_password
      - ingestion_runtime_password
      - ingestion_cleanup_password
      - ingestion_e2e_password
    volumes:
      - ./infra/postgres/core-init.sql:/bootstrap/core-init.sql:ro
      - ./scripts/run-postgres-bootstrap.sh:/usr/local/bin/run-postgres-bootstrap:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/usr/local/bin/run-postgres-bootstrap"]

  retrieval-db-bootstrap:
    <<: *job-hardening
    profiles: ["m5", "m5-contract-test"]
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: raglibrarian_platform
      PGUSER: raglibrarian_bootstrap
      PGPASSFILE: /run/secrets/postgres_pgpass
      BOOTSTRAP_SQL_FILE: /bootstrap/retrieval-init.sql
      BOOTSTRAP_COMPLETE_MESSAGE: Retrieval database roles and privileges are ready
    secrets:
      - postgres_pgpass
      - retrieval_migration_password
      - retrieval_runtime_password
      - retrieval_search_password
      - retrieval_planner_password
      - retrieval_indexer_password
      - retrieval_dispatcher_password
      - retrieval_cleanup_password
      - retrieval_e2e_password
    volumes:
      - ./infra/postgres/retrieval-init.sql:/bootstrap/retrieval-init.sql:ro
      - ./scripts/run-postgres-bootstrap.sh:/usr/local/bin/run-postgres-bootstrap:ro
    networks:
      - backend
    depends_on:
      identity-db-bootstrap:
        condition: service_completed_successfully
    command: ["/usr/local/bin/run-postgres-bootstrap"]

  identity-migrate:
    <<: *job-hardening
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: identity
      PGUSER: identity_migrator
      PGPASSFILE: /run/secrets/identity_migration_pgpass
      MIGRATION_DIRECTION: up
    secrets:
      - identity_migration_pgpass
    volumes:
      - ./services/identity-service/migrations:/migrations:ro
      - ./scripts/run-identity-migrations.sh:/usr/local/bin/run-identity-migrations:ro
    networks:
      - backend
    depends_on:
      identity-db-bootstrap:
        condition: service_completed_successfully
    command: ["/usr/local/bin/run-identity-migrations"]

  mailpit:
    image: axllent/mailpit:v1.30.0
    user: "65532:65532"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    environment:
      MP_DATABASE: /tmp/mailpit.db
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - backend
      - frontend

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
    networks:
      - catalog-storage
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 4s
      retries: 10

  minio-bootstrap:
    <<: *job-hardening
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: ["/bin/sh"]
    environment:
      MC_CONFIG_DIR: /tmp/.mc
    secrets:
      - minio_root_user
      - minio_root_password
      - catalog_minio_access_key
      - catalog_minio_secret_key
      - ingestion_minio_access_key
      - ingestion_minio_secret_key
      - ingestion_cleanup_minio_access_key
      - ingestion_cleanup_minio_secret_key
      - ingestion_e2e_minio_access_key
      - ingestion_e2e_minio_secret_key
      - retrieval_minio_access_key
      - retrieval_minio_secret_key
    volumes:
      - ./scripts/bootstrap-minio.sh:/usr/local/bin/bootstrap-minio:ro
    networks:
      - catalog-storage
    depends_on:
      minio:
        condition: service_healthy
    command: ["/usr/local/bin/bootstrap-minio"]

  rabbitmq:
    image: rabbitmq:4.1.0-management-alpine
    entrypoint: ["/bin/sh", "/usr/local/bin/bootstrap-rabbitmq"]
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ${SECRET_DIR:-./.dev/secrets}/rabbitmq_definitions.json:/bootstrap/rabbitmq_definitions.json:ro
      - ./scripts/bootstrap-rabbitmq.sh:/usr/local/bin/bootstrap-rabbitmq:ro
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_PORT:-5672}:5672"
    networks:
      - catalog-broker
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 4s
      retries: 10

  identity-service:
    <<: *service-hardening
    build: { context: ., args: { SERVICE: identity-service } }
    environment:
      IDENTITY_GRPC_ADDR: ":50051"
      IDENTITY_POSTGRES_DSN_FILE: /run/secrets/identity_runtime_dsn
      IDENTITY_SIGNING_KEY_FILE: /run/secrets/identity_signing_key
      IDENTITY_BOOTSTRAP_VERIFIER_FILE: /run/secrets/identity_bootstrap_verifier
      IDENTITY_EMAIL_OUTBOX_KEY_FILE: /run/secrets/identity_email_outbox_key
      IDENTITY_EMAIL_OUTBOX_KEY_ID: local-v1
      IDENTITY_EMAIL_FINGERPRINT_KEY_FILE: /run/secrets/identity_email_fingerprint_key
      IDENTITY_PASSWORD_RESET_HMAC_KEY_FILE: /run/secrets/identity_password_reset_hmac_key
      IDENTITY_SMTP_PASSWORD_FILE: /run/secrets/identity_smtp_password
      IDENTITY_SMTP_ADDR: mailpit:1025
      IDENTITY_SMTP_SERVER_NAME: mailpit
      IDENTITY_SMTP_FROM: no-reply@raglibrarian.local
      IDENTITY_VERIFY_URL: http://localhost:5173/verify-email
      IDENTITY_SMTP_STARTTLS: "false"
      IDENTITY_TLS_KEY_FILE: /run/secrets/identity_tls_key
      IDENTITY_TLS_CERT_FILE: /run/secrets/identity_tls_cert
      INTERNAL_TLS_CA_FILE: /run/secrets/internal_ca
      HEALTHCHECK_GRPC_TARGET: localhost:50051
      HEALTHCHECK_TLS_SERVER_NAME: identity-service
      HEALTHCHECK_TLS_CERT_FILE: /run/secrets/identity_tls_cert
      HEALTHCHECK_TLS_KEY_FILE: /run/secrets/identity_tls_key
      IDENTITY_BCRYPT_CONCURRENCY: "${IDENTITY_BCRYPT_CONCURRENCY:-4}"
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - internal_ca
      - identity_tls_cert
      - identity_tls_key
      - identity_password_reset_hmac_key
      - identity_runtime_dsn
      - identity_signing_key
      - identity_bootstrap_verifier
      - identity_email_outbox_key
      - identity_email_fingerprint_key
      - identity_smtp_password
    networks:
      - backend
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 10

  catalog-service:
    <<: *service-hardening
    build: { context: ., args: { SERVICE: catalog-service } }
    environment:
      CATALOG_GRPC_ADDR: ":50052"
      CATALOG_METRICS_ADDR: "0.0.0.0:9092"
      CATALOG_POSTGRES_DSN_FILE: /run/secrets/catalog_runtime_dsn
      CATALOG_MINIO_ENDPOINT: minio:9000
      # Plain HTTP is an explicit local-only exception on the isolated storage network.
      CATALOG_MINIO_INSECURE: "true"
      CATALOG_MINIO_BUCKET: original-books
      CATALOG_MINIO_ACCESS_KEY_FILE: /run/secrets/catalog_minio_access_key
      CATALOG_MINIO_SECRET_KEY_FILE: /run/secrets/catalog_minio_secret_key
      CATALOG_RABBITMQ_URI_FILE: /run/secrets/catalog_rabbitmq_uri
      CATALOG_INGESTION_RABBITMQ_URI_FILE: /run/secrets/catalog_ingestion_rabbitmq_uri
      CATALOG_RETRIEVAL_RABBITMQ_URI_FILE: /run/secrets/catalog_retrieval_rabbitmq_uri
      INTERNAL_TLS_CA_FILE: /run/secrets/internal_ca
      CATALOG_TLS_CERT_FILE: /run/secrets/catalog_tls_cert
      CATALOG_TLS_KEY_FILE: /run/secrets/catalog_tls_key
      HEALTHCHECK_GRPC_TARGET: localhost:50052
      HEALTHCHECK_TLS_SERVER_NAME: catalog-service
      HEALTHCHECK_TLS_CERT_FILE: /run/secrets/catalog_tls_cert
      HEALTHCHECK_TLS_KEY_FILE: /run/secrets/catalog_tls_key
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - internal_ca
      - catalog_tls_cert
      - catalog_tls_key
      - catalog_runtime_dsn
      - catalog_minio_access_key
      - catalog_minio_secret_key
      - catalog_rabbitmq_uri
      - catalog_ingestion_rabbitmq_uri
      - catalog_retrieval_rabbitmq_uri
    networks:
      - backend
      # MinIO and RabbitMQ credentials are development-only plaintext values;
      # keep them off the shared backend network until TLS is provisioned.
      - catalog-storage
      - catalog-broker
    expose:
      - "9092"
    depends_on:
      catalog-migrate:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 10

  edge-api: &edge-api-service
    <<: *service-hardening
    build: { context: ., args: { SERVICE: edge-api } }
    env_file:
      - ${SECRET_DIR:-./.dev/secrets}/edge.env
    ports:
      - "127.0.0.1:${EDGE_PORT:-8080}:8080"
    environment: &edge-api-environment
      QUERY_ADDR: ":8080"
      IDENTITY_GRPC_ADDR: identity-service:50051
      RETRIEVAL_GRPC_ADDR: retrieval-service:50054
      ANSWER_GRPC_ADDR: answer-service:50055
      CATALOG_GRPC_ADDR: catalog-service:50052
      INTERNAL_TLS_CA_FILE: /run/secrets/internal_ca
      EDGE_TLS_CERT_FILE: /run/secrets/edge_tls_cert
      EDGE_TLS_KEY_FILE: /run/secrets/edge_tls_key
      EDGE_STATUS_RABBITMQ_URI_FILE: /run/secrets/edge_status_rabbitmq_uri_1
      EDGE_STATUS_QUEUE: edge.book-status.local.1
      EDGE_PUBLIC_ORIGIN: "${EDGE_PUBLIC_ORIGIN:-http://localhost:5173}"
      EDGE_ENFORCE_BROWSER_ORIGIN: "${EDGE_ENFORCE_BROWSER_ORIGIN:-true}"
      EDGE_INSECURE_REFRESH_COOKIE: "${EDGE_INSECURE_REFRESH_COOKIE:-false}"
      EDGE_RETRIEVAL_READINESS_REQUIRED: "${EDGE_RETRIEVAL_READINESS_REQUIRED:-false}"
      EDGE_TRUSTED_PROXY_CIDRS: "${EDGE_TRUSTED_PROXY_CIDRS:-}"
      HEALTHCHECK_HTTP_URL: http://localhost:8080/readyz
      LOG_ENV: production
      LOG_LEVEL: info
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - internal_ca
      - edge_tls_cert
      - edge_tls_key
      - edge_status_rabbitmq_uri_1
    networks:
      - frontend
      - backend
      - catalog-broker
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 10

  edge-api-2:
    <<: *edge-api-service
    profiles: ["m4-ha"]
    ports:
      - "127.0.0.1:${EDGE_SECONDARY_PORT:-8081}:8080"
    environment:
      <<: *edge-api-environment
      EDGE_STATUS_RABBITMQ_URI_FILE: /run/secrets/edge_status_rabbitmq_uri_2
      EDGE_STATUS_QUEUE: edge.book-status.local.2
    secrets:
      - internal_ca
      - edge_tls_cert
      - edge_tls_key
      - edge_status_rabbitmq_uri_2

  catalog-migrate:
    <<: *job-hardening
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: catalog
      PGUSER: catalog_migrator
      PGPASSFILE: /run/secrets/catalog_migration_pgpass
      MIGRATION_DIRECTION: up
    secrets:
      - catalog_migration_pgpass
    volumes:
      - ./services/catalog-service/migrations:/migrations:ro
      - ./scripts/run-catalog-migrations.sh:/usr/local/bin/run-catalog-migrations:ro
    networks:
      - backend
    depends_on:
      identity-db-bootstrap:
        condition: service_completed_successfully
    command: ["/usr/local/bin/run-catalog-migrations"]

  ingestion-migrate:
    <<: *job-hardening
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ingestion
      PGUSER: ingestion_migrator
      PGPASSFILE: /run/secrets/ingestion_migration_pgpass
      MIGRATION_DIRECTION: up
    secrets:
      - ingestion_migration_pgpass
    volumes:
      - ./services/ingestion-service/migrations:/migrations:ro
      - ./scripts/run-ingestion-migrations.sh:/usr/local/bin/run-ingestion-migrations:ro
    networks:
      - backend
    depends_on:
      identity-db-bootstrap:
        condition: service_completed_successfully
    command: ["/usr/local/bin/run-ingestion-migrations"]

  ingestion-service:
    <<: *service-hardening
    build:
      context: .
      target: ingestion-runtime
      args:
        SERVICE: ingestion-service
        SERVICE_COMMAND: cmd/worker
    environment:
      INGESTION_POSTGRES_DSN_FILE: /run/secrets/ingestion_runtime_dsn
      INGESTION_RABBITMQ_URI_FILE: /run/secrets/ingestion_rabbitmq_uri
      INGESTION_MINIO_ENDPOINT: minio:9000
      INGESTION_MINIO_INSECURE: "true"
      INGESTION_MINIO_ACCESS_KEY_FILE: /run/secrets/ingestion_minio_access_key
      INGESTION_MINIO_SECRET_KEY_FILE: /run/secrets/ingestion_minio_secret_key
      INGESTION_SOURCE_BUCKET: original-books
      INGESTION_ARTIFACT_BUCKET: ingestion-artifacts
      INGESTION_TOKENIZER_FILE: /opt/raglibrarian/cl100k_base.tiktoken
      INGESTION_METRICS_ADDR: "0.0.0.0:9093"
      HEALTHCHECK_HTTP_URL: http://127.0.0.1:9093/readyz
      # One parser sandbox can reserve 768 MiB. Keep at least 256 MiB for the
      # worker; scale service replicas for additional throughput at this limit.
      INGESTION_WORK_CONCURRENCY: "${INGESTION_WORK_CONCURRENCY:-1}"
      INGESTION_MAX_SOURCE_BYTES: "26214400"
      INGESTION_MAX_EXTRACTED_BYTES: "67108864"
      INGESTION_MAX_PAGES: "500"
      # Leave 256 MiB for filesystem metadata and runtime scratch within tmpfs.
      INGESTION_MAX_TEMP_BYTES: "805306368"
      INGESTION_MEMORY_LIMIT_BYTES: "1073741824"
      INGESTION_PROCESSING_TIMEOUT: "12m30s"
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - ingestion_runtime_dsn
      - ingestion_rabbitmq_uri
      - ingestion_minio_access_key
      - ingestion_minio_secret_key
    networks:
      - backend
      - catalog-storage
      - catalog-broker
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g
    mem_limit: "${INGESTION_MEMORY_LIMIT:-1g}"
    cpus: "${INGESTION_CPU_LIMIT:-2.0}"
    pids_limit: 128
    ulimits:
      nofile:
        soft: 1024
        hard: 1024
    depends_on:
      ingestion-migrate:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 10s

  retrieval-migrate:
    <<: *job-hardening
    profiles: ["m5", "m5-contract-test"]
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: retrieval
      PGUSER: retrieval_migrator
      PGPASSFILE: /run/secrets/retrieval_migration_pgpass
      MIGRATION_DIRECTION: up
    secrets:
      - retrieval_migration_pgpass
    volumes:
      - ./services/retrieval-service/migrations:/migrations:ro
      - ./scripts/run-retrieval-migrations.sh:/usr/local/bin/run-retrieval-migrations:ro
    networks:
      - backend
    depends_on:
      retrieval-db-bootstrap:
        condition: service_completed_successfully
    command: ["sh", "/usr/local/bin/run-retrieval-migrations"]

  qdrant:
    profiles: ["m5", "m5-contract-test"]
    image: ${M5_QDRANT_IMAGE:-qdrant/qdrant:v1.18.3}
    read_only: true
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    entrypoint: ["/bin/sh", "-ec"]
    working_dir: /qdrant/storage
    command:
      - 'export QDRANT__SERVICE__API_KEY="$$(cat /run/secrets/retrieval_qdrant_api_key)"; export QDRANT__SERVICE__READ_ONLY_API_KEY="$$(cat /run/secrets/retrieval_qdrant_read_api_key)"; exec /qdrant/qdrant'
    environment:
      QDRANT__SERVICE__ENABLE_TLS: "false"
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    secrets:
      - retrieval_qdrant_api_key
      - retrieval_qdrant_read_api_key
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - retrieval-index
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    pids_limit: 256
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-ec", "test -r /run/secrets/retrieval_qdrant_api_key && : >/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 10s

  retrieval-qdrant-init:
    <<: *job-hardening
    cap_add:
      - DAC_READ_SEARCH
      - SETGID
      - SETUID
    profiles: ["m5", "m5-contract-test"]
    build:
      context: .
      target: retrieval-runtime
      args:
        SERVICE: retrieval-service
        SERVICE_COMMAND: cmd/qdrant_init
    environment:
      RETRIEVAL_QDRANT_URL: http://qdrant:6333
      RETRIEVAL_QDRANT_COLLECTION: evidence_v2
      RETRIEVAL_QDRANT_API_KEY_FILE: /run/secrets/retrieval_qdrant_api_key
    secrets:
      - retrieval_qdrant_api_key
    networks:
      - retrieval-index
    depends_on:
      qdrant:
        condition: service_healthy
    pids_limit: 128

  text-embeddings-inference:
    profiles: ["m5", "m5-contract-test"]
    image: ${M5_TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference@sha256:cb570aabbfa016b86684f576b5bd72d1ee96cc0b7a00b0ad221b298762b32157}
    read_only: true
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      HF_HUB_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
    command:
      - --model-id
      - /data/model
      - --auto-truncate
      - "false"
      - --max-client-batch-size
      - "32"
      - --port
      - "8080"
    volumes:
      - ${M5_MODEL_DIR:-./.dev/models/m5-jina-code-v1}:/data/model:ro
    networks:
      - retrieval-index
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
    mem_limit: ${M5_TEI_MEMORY_LIMIT:-4g}
    cpus: ${M5_TEI_CPU_LIMIT:-4.0}
    pids_limit: 256
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  retrieval-service:
    <<: *service-hardening
    profiles: ["m5", "m5-contract-test"]
    build:
      context: .
      target: retrieval-runtime
      args:
        SERVICE: retrieval-service
        SERVICE_COMMAND: cmd/server
    environment:
      RETRIEVAL_POSTGRES_DSN_FILE: /run/secrets/retrieval_search_dsn
      RETRIEVAL_QDRANT_URL: http://qdrant:6333
      RETRIEVAL_QDRANT_API_KEY_FILE: /run/secrets/retrieval_qdrant_read_api_key
      RETRIEVAL_TEI_URL: http://text-embeddings-inference:8080
      RETRIEVAL_INDEX_PROFILE: m7-pdf-epub-v1
      RETRIEVAL_GRPC_ADDR: "0.0.0.0:50054"
      RETRIEVAL_METRICS_ADDR: "0.0.0.0:9094"
      RETRIEVAL_TLS_CA_FILE: /run/secrets/internal_ca
      RETRIEVAL_TLS_CERT_FILE: /run/secrets/retrieval_tls_cert
      RETRIEVAL_TLS_KEY_FILE: /run/secrets/retrieval_tls_key
      HEALTHCHECK_HTTP_URL: http://127.0.0.1:9094/readyz
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - retrieval_search_dsn
      - retrieval_qdrant_read_api_key
      - internal_ca
      - retrieval_tls_cert
      - retrieval_tls_key
    networks:
      - backend
      - retrieval-index
    depends_on:
      retrieval-migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      retrieval-qdrant-init:
        condition: service_completed_successfully
      text-embeddings-inference:
        condition: service_healthy
    pids_limit: 128
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 10s

  answer-service:
    <<: *service-hardening
    profiles: ["m6"]
    build:
      context: .
      target: service-runtime
      args:
        SERVICE: answer-service
        SERVICE_COMMAND: cmd/server
    environment:
      ANSWER_GRPC_ADDR: "0.0.0.0:50055"
      ANSWER_METRICS_ADDR: "0.0.0.0:9096"
      ANSWER_RETRIEVAL_GRPC_ADDR: retrieval-service:50054
      ANSWER_LLM_BASE_URL: "${ANSWER_LLM_BASE_URL:-https://llm-provider-stub:8443}"
      ANSWER_LLM_MODEL: "${ANSWER_LLM_MODEL:-raglibrarian-deterministic}"
      ANSWER_LLM_API_KEY_FILE: /run/secrets/answer_llm_api_key
      ANSWER_LLM_CA_FILE: /run/secrets/internal_ca
      ANSWER_TLS_CA_FILE: /run/secrets/internal_ca
      ANSWER_TLS_CERT_FILE: /run/secrets/answer_tls_cert
      ANSWER_TLS_KEY_FILE: /run/secrets/answer_tls_key
      HEALTHCHECK_HTTP_URL: http://127.0.0.1:9096/readyz
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - internal_ca
      - answer_tls_cert
      - answer_tls_key
      - answer_llm_api_key
    networks:
      - backend
      - answer-provider-egress
    depends_on:
      retrieval-service:
        condition: service_healthy
    expose:
      - "50055"
      - "9096"
    pids_limit: 128
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 10s

  # Local Compose deliberately runs only this portable preparation adapter.
  # Planner/index/dispatcher/cleanup Lambdas exist only in the AWS M5 stack.
  retrieval-worker:
    <<: *service-hardening
    profiles: ["m5"]
    build:
      context: .
      target: retrieval-runtime
      args:
        SERVICE: retrieval-service
        SERVICE_COMMAND: cmd/worker
    environment:
      RETRIEVAL_PROCESSING_MODE: worker
      RETRIEVAL_POSTGRES_DSN_FILE: /run/secrets/retrieval_runtime_dsn
      RETRIEVAL_RABBITMQ_CONSUMER_URI_FILE: /run/secrets/retrieval_consumer_rabbitmq_uri
      RETRIEVAL_RABBITMQ_PUBLISHER_URI_FILE: /run/secrets/retrieval_publisher_rabbitmq_uri
      RETRIEVAL_MINIO_ENDPOINT: minio:9000
      RETRIEVAL_MINIO_INSECURE: "true"
      RETRIEVAL_MINIO_ACCESS_KEY_FILE: /run/secrets/retrieval_minio_access_key
      RETRIEVAL_MINIO_SECRET_KEY_FILE: /run/secrets/retrieval_minio_secret_key
      RETRIEVAL_ARTIFACT_BUCKET: ingestion-artifacts
      RETRIEVAL_QDRANT_URL: http://qdrant:6333
      RETRIEVAL_QDRANT_API_KEY_FILE: /run/secrets/retrieval_qdrant_api_key
      RETRIEVAL_TEI_URL: http://text-embeddings-inference:8080
      RETRIEVAL_INDEX_PROFILE: m7-pdf-epub-v1
      RETRIEVAL_METRICS_ADDR: "0.0.0.0:9095"
      HEALTHCHECK_HTTP_URL: http://127.0.0.1:9095/readyz
      RETRIEVAL_WORK_CONCURRENCY: "${RETRIEVAL_WORK_CONCURRENCY:-1}"
      RUN_AS_UID: "${RUN_AS_UID:-65532}"
      RUN_AS_GID: "${RUN_AS_GID:-65532}"
    secrets:
      - retrieval_runtime_dsn
      - retrieval_consumer_rabbitmq_uri
      - retrieval_publisher_rabbitmq_uri
      - retrieval_minio_access_key
      - retrieval_minio_secret_key
      - retrieval_qdrant_api_key
    networks:
      - backend
      - catalog-storage
      - catalog-broker
      - retrieval-index
    depends_on:
      retrieval-migrate:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      retrieval-qdrant-init:
        condition: service_completed_successfully
      text-embeddings-inference:
        condition: service_healthy
    pids_limit: 128
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 10s

  contract-tests:
    <<: *job-hardening
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=1g
    profiles: ["test"]
    build:
      context: .
      target: contract-tests
      args: { SERVICE: edge-api }
    environment:
      IDENTITY_GRPC_ADDR: identity-service:50051
      IDENTITY_POSTGRES_DSN_FILE: /run/secrets/identity_runtime_dsn
      IDENTITY_MIGRATION_POSTGRES_DSN_FILE: /run/secrets/identity_migration_dsn
      CATALOG_OUTBOX_INTEGRATION: "true"
      CATALOG_POSTGRES_INTEGRATION: "true"
      CATALOG_MIGRATION_INTEGRATION: "true"
      CATALOG_POSTGRES_DSN_FILE: /run/secrets/catalog_runtime_dsn
      CATALOG_RABBITMQ_URI_FILE: /run/secrets/catalog_rabbitmq_uri
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: catalog
      PGUSER: catalog_migrator
      PGPASSFILE: /run/secrets/catalog_migration_pgpass
      INGESTION_POSTGRES_DSN_FILE: /run/secrets/ingestion_runtime_dsn
      INGESTION_RABBITMQ_URI_FILE: /run/secrets/ingestion_rabbitmq_uri
      INGESTION_MINIO_ENDPOINT: minio:9000
      INGESTION_MINIO_INSECURE: "true"
      INGESTION_MINIO_ACCESS_KEY_FILE: /run/secrets/ingestion_minio_access_key
      INGESTION_MINIO_SECRET_KEY_FILE: /run/secrets/ingestion_minio_secret_key
      INGESTION_SOURCE_BUCKET: original-books
      INGESTION_ARTIFACT_BUCKET: ingestion-artifacts
      INGESTION_TOKENIZER_FILE: /opt/raglibrarian/cl100k_base.tiktoken
      INGESTION_POSTGRES_INTEGRATION: "true"
      INGESTION_MINIO_INTEGRATION: "true"
      M4_E2E_INGESTION_POSTGRES_DSN_FILE: /run/secrets/ingestion_e2e_container_dsn
      M4_E2E_MINIO_ENDPOINT: minio:9000
      M4_E2E_MINIO_INSECURE: "true"
      M4_E2E_MINIO_ACCESS_KEY_FILE: /run/secrets/ingestion_e2e_minio_access_key
      M4_E2E_MINIO_SECRET_KEY_FILE: /run/secrets/ingestion_e2e_minio_secret_key
      M4_E2E_MINIO_ARTIFACT_BUCKET: ingestion-artifacts
      M4_E2E_RABBITMQ_URI_FILE: /run/secrets/ingestion_e2e_rabbitmq_container_uri
      CATALOG_GRPC_ADDR: catalog-service:50052
      GRPC_CONTRACT_TESTS: "true"
      EDGE_VERIFY_KEY_FILE: /run/secrets/edge_verify_key
      INTERNAL_TLS_CA_FILE: /run/secrets/internal_ca
      EDGE_TLS_CERT_FILE: /run/secrets/edge_tls_cert
      EDGE_TLS_KEY_FILE: /run/secrets/edge_tls_key
      CATALOG_TLS_CERT_FILE: /run/secrets/catalog_tls_cert
      CATALOG_TLS_KEY_FILE: /run/secrets/catalog_tls_key
      UNKNOWN_TLS_CERT_FILE: /run/secrets/unknown_tls_cert
      UNKNOWN_TLS_KEY_FILE: /run/secrets/unknown_tls_key
      GOCACHE: /tmp/go-build
    secrets:
      - identity_runtime_dsn
      - identity_migration_dsn
      - catalog_runtime_dsn
      - catalog_migration_pgpass
      - catalog_rabbitmq_uri
      - ingestion_runtime_dsn
      - ingestion_rabbitmq_uri
      - ingestion_minio_access_key
      - ingestion_minio_secret_key
      - ingestion_e2e_container_dsn
      - ingestion_e2e_rabbitmq_container_uri
      - ingestion_e2e_minio_access_key
      - ingestion_e2e_minio_secret_key
      - edge_verify_key
      - internal_ca
      - edge_tls_cert
      - edge_tls_key
      - catalog_tls_cert
      - catalog_tls_key
      - unknown_tls_cert
      - unknown_tls_key
    networks:
      - backend
      - catalog-broker
      - catalog-storage
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy

  retrieval-contract-tests:
    <<: *job-hardening
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=1g
    profiles: ["m5-contract-test"]
    build:
      context: .
      target: contract-tests
      args:
        SERVICE: retrieval-service
        SERVICE_COMMAND: cmd/server
    environment:
      RETRIEVAL_POSTGRES_INTEGRATION: "true"
      RETRIEVAL_POSTGRES_DSN_FILE: /run/secrets/retrieval_runtime_dsn
      RETRIEVAL_PLANNER_POSTGRES_DSN_FILE: /run/secrets/retrieval_planner_dsn
      RETRIEVAL_CLEANUP_POSTGRES_DSN_FILE: /run/secrets/retrieval_cleanup_dsn
      GOCACHE: /tmp/go-build
    secrets:
      - retrieval_runtime_dsn
      - retrieval_planner_dsn
      - retrieval_cleanup_dsn
    networks:
      - backend
      - retrieval-index
    depends_on:
      retrieval-service:
        condition: service_healthy
    command: ["grep -q '[^[:space:]]' \"$$RETRIEVAL_POSTGRES_DSN_FILE\" && grep -q '[^[:space:]]' \"$$RETRIEVAL_PLANNER_POSTGRES_DSN_FILE\" && grep -q '[^[:space:]]' \"$$RETRIEVAL_CLEANUP_POSTGRES_DSN_FILE\" && go -C /src/services/retrieval-service test -count=1 -v ./internal/application ./internal/domain ./internal/grpc ./internal/transport ./internal/vector && go -C /src/services/retrieval-service test -count=1 -v -tags=integration -run 'Replay|Recovery|TerminalFailure|Visibility|Manifest|FailBatch|CompleteBatch|Lifecycle|Deletion|RolePrivileges' ./internal/repository"]

  answer-contract-tests:
    <<: *job-hardening
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=1g
    profiles: ["m6-test"]
    build:
      context: .
      target: contract-tests
      args:
        SERVICE: answer-service
        SERVICE_COMMAND: cmd/server
    environment:
      M6_GRPC_CONTRACT_TESTS: "true"
      ANSWER_GRPC_ADDR: answer-service:50055
      RETRIEVAL_GRPC_ADDR: retrieval-service:50054
      INTERNAL_TLS_CA_FILE: /run/secrets/internal_ca
      EDGE_TLS_CERT_FILE: /run/secrets/edge_tls_cert
      EDGE_TLS_KEY_FILE: /run/secrets/edge_tls_key
      ANSWER_TLS_CERT_FILE: /run/secrets/answer_tls_cert
      ANSWER_TLS_KEY_FILE: /run/secrets/answer_tls_key
      RETRIEVAL_TLS_CERT_FILE: /run/secrets/retrieval_tls_cert
      RETRIEVAL_TLS_KEY_FILE: /run/secrets/retrieval_tls_key
      UNKNOWN_TLS_CERT_FILE: /run/secrets/unknown_tls_cert
      UNKNOWN_TLS_KEY_FILE: /run/secrets/unknown_tls_key
      GOCACHE: /tmp/go-build
    secrets:
      - internal_ca
      - edge_tls_cert
      - edge_tls_key
      - answer_tls_cert
      - answer_tls_key
      - retrieval_tls_cert
      - retrieval_tls_key
      - unknown_tls_cert
      - unknown_tls_key
    networks:
      - backend
    depends_on:
      answer-service:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy
    command: ["go -C /src/tests/e2e test -count=1 -v -tags='e2e m6' -run '^TestGRPCM6' ./..."]

  catalog-minio-runtime-tests:
    <<: *job-hardening
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=1g
    profiles: ["minio-runtime-test"]
    build:
      context: .
      target: contract-tests
      args: { SERVICE: catalog-service }
    environment:
      CATALOG_MINIO_INTEGRATION: "true"
      CATALOG_MINIO_ENDPOINT: minio:9000
      CATALOG_MINIO_BUCKET: original-books
      CATALOG_ARTIFACT_BUCKET: ingestion-artifacts
      CATALOG_MINIO_ACCESS_KEY_FILE: /run/secrets/catalog_minio_access_key
      CATALOG_MINIO_SECRET_KEY_FILE: /run/secrets/catalog_minio_secret_key
      INGESTION_MINIO_ACCESS_KEY_FILE: /run/secrets/ingestion_minio_access_key
      INGESTION_MINIO_SECRET_KEY_FILE: /run/secrets/ingestion_minio_secret_key
      RETRIEVAL_MINIO_ACCESS_KEY_FILE: /run/secrets/retrieval_minio_access_key
      RETRIEVAL_MINIO_SECRET_KEY_FILE: /run/secrets/retrieval_minio_secret_key
      CATALOG_OBJECT_STORE_BOUNDARY_TEST: "true"
      GOCACHE: /tmp/go-build
    secrets:
      - catalog_minio_access_key
      - catalog_minio_secret_key
      - ingestion_minio_access_key
      - ingestion_minio_secret_key
      - retrieval_minio_access_key
      - retrieval_minio_secret_key
    networks:
      - catalog-storage
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
    command: ["go -C /src/services/catalog-service test -v -tags=miniointegration ./repository"]

