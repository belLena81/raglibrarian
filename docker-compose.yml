version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raglibrarian"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-service:
    build: { context: ., args: { SERVICE: identity-service } }
    environment:
      IDENTITY_GRPC_ADDR: ":50051"
      IDENTITY_POSTGRES_DSN: "${IDENTITY_POSTGRES_DSN:?IDENTITY_POSTGRES_DSN is required}"
      IDENTITY_SIGNING_KEY: "${IDENTITY_SIGNING_KEY:?IDENTITY_SIGNING_KEY is required}"
      INTERNAL_TLS_CA_FILE: /certs/ca.crt
      IDENTITY_TLS_CERT_FILE: /certs/identity-service.crt
      IDENTITY_TLS_KEY_FILE: /certs/identity-service.key
    volumes: ["./.dev/certs:/certs:ro"]
    depends_on: { postgres: { condition: service_healthy } }

  catalog-service:
    build: { context: ., args: { SERVICE: catalog-service } }
    environment:
      CATALOG_GRPC_ADDR: ":50052"
      INTERNAL_TLS_CA_FILE: /certs/ca.crt
      CATALOG_TLS_CERT_FILE: /certs/catalog-service.crt
      CATALOG_TLS_KEY_FILE: /certs/catalog-service.key
    volumes: ["./.dev/certs:/certs:ro"]

  edge-api:
    build: { context: ., args: { SERVICE: edge-api } }
    ports: ["8080:8080"]
    environment:
      QUERY_ADDR: ":8080"
      IDENTITY_GRPC_ADDR: "identity-service:50051"
      EDGE_VERIFY_KEY: "${EDGE_VERIFY_KEY:?EDGE_VERIFY_KEY is required}"
      INTERNAL_TLS_CA_FILE: /certs/ca.crt
      EDGE_TLS_CERT_FILE: /certs/edge-api.crt
      EDGE_TLS_KEY_FILE: /certs/edge-api.key
      EDGE_INSECURE_REFRESH_COOKIE: "${EDGE_INSECURE_REFRESH_COOKIE:-false}"
      LOG_ENV: "production"
      LOG_LEVEL: "info"
    volumes: ["./.dev/certs:/certs:ro"]
    depends_on: { identity-service: { condition: service_started }, catalog-service: { condition: service_started } }

volumes:
  postgres_data:
