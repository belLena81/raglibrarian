name: quality

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 2 * * 2,5'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5.5.0
        with:
          go-version: '1.26.5'
          cache: true
      - name: Install pinned Go and protobuf tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Install pinned golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          install-only: true
      - name: Run Go quality gates
        run: make fmt-check vet lint test test-race arch-check vuln proto-check proto-breaking dev-secrets-test

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive
          token: ${{ secrets.UI_SUBMODULE_READ_TOKEN }}
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build, lint, and type-check UI
        run: make ui-check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UI_SUBMODULE_READ_TOKEN }}
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies for dependency audit
        run: npm --prefix ui ci
      - name: Scan repository, Dockerfile, and service images
        run: make security-check

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install pinned AWS SAM CLI
        run: pipx install aws-sam-cli==1.145.2
      - name: Validate the M4 and M5 SAM/CloudFormation graphs
        run: make sam-validate sam-m5-validate

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.5.0
        with:
          go-version: '1.26.5'
      - name: Install pinned protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Create ephemeral file-backed local configuration
        run: |
          cp .env.example .env
          make dev-secrets dev-certs
          bash ./scripts/ensure-m5-dev-cert.sh
          umask 077
          openssl rand -base64 24 | tr -d '\n' > .dev/secrets/e2e_bootstrap_code
          { printf 'raglibrarian/admin-bootstrap/v1\0'; cat .dev/secrets/e2e_bootstrap_code; } \
            | openssl dgst -sha256 -binary > .dev/secrets/identity_bootstrap_verifier
          chmod 400 .dev/secrets/e2e_bootstrap_code .dev/secrets/identity_bootstrap_verifier
      - name: Validate and start the local stack
        run: |
          make compose-config
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile m4-ha --profile m5 config --quiet
          EDGE_RETRIEVAL_READINESS_REQUIRED=true docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile m4-ha --profile m5 up -d --build --wait --wait-timeout 300
      - name: Show TEI startup diagnostics
        if: failure()
        run: |
          docker inspect --format 'exit={{.State.ExitCode}} oom_killed={{.State.OOMKilled}} error={{.State.Error}} memory_bytes={{.HostConfig.Memory}} nano_cpus={{.HostConfig.NanoCPUs}}' raglibrarian-text-embeddings-inference-1 || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=200 text-embeddings-inference || true
      - name: Run live mTLS service contracts
        run: make m4-contract-test
      - name: Verify MinIO multipart cleanup
        run: make minio-runtime-test
      - name: Run black-box and controlled worker-recovery tests
        run: |
          E2E_BOOTSTRAP_CODE="$(cat .dev/secrets/e2e_bootstrap_code)" \
          E2E_MAIL_FIXTURE_URL=http://127.0.0.1:8025/view/latest.txt \
            make m4-m5-integration-test
      - name: Run M5 Retrieval contracts and focused recovery tests
        run: make m5-contract-test m5-worker-recovery-test
      - name: Verify database-loss readiness behavior
        run: |
          docker compose stop postgres
          for attempt in $(seq 1 30); do
            ready_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/readyz)
            live_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/healthz)
            if [ "$ready_status" = "503" ] && [ "$live_status" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Show container state
        if: failure()
        run: docker compose ps --all
      - name: Tear down stack
        if: always()
        run: docker compose --profile m4-ha down -v

  m4-performance:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.5.0
        with:
          go-version: '1.26.5'
      - name: Install pinned protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Create ephemeral file-backed local configuration
        run: |
          cp .env.example .env
          make dev-secrets dev-certs
          umask 077
          openssl rand -base64 24 | tr -d '\n' > .dev/secrets/e2e_bootstrap_code
          { printf 'raglibrarian/admin-bootstrap/v1\0'; cat .dev/secrets/e2e_bootstrap_code; } \
            | openssl dgst -sha256 -binary > .dev/secrets/identity_bootstrap_verifier
          chmod 400 .dev/secrets/e2e_bootstrap_code .dev/secrets/identity_bootstrap_verifier
      - name: Start isolated M4 stack
        run: docker compose --profile m4-ha up -d --build --wait --wait-timeout 240
      - name: Run M4 performance smoke and soak suites
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
          E2E_SECONDARY_BASE_URL: http://127.0.0.1:8081
          E2E_MAIL_FIXTURE_URL: http://127.0.0.1:8025/view/latest.txt
          M4_PERFORMANCE_PROFILE: m4-slo-v1
          M4_SOAK_DURATION: 30m
        run: |
          token_dir="$(mktemp -d /tmp/raglibrarian-m4-tokens.XXXXXX)"
          chmod 700 "$token_dir"
          trap 'rm -f "$token_dir/access" "$token_dir/refresh" "$token_dir/revocable"; rmdir "$token_dir"' EXIT
          E2E_BOOTSTRAP_CODE="$(cat .dev/secrets/e2e_bootstrap_code)" \
          E2E_M4_ACCESS_TOKEN_OUT="$token_dir/access" \
          E2E_M4_REFRESH_COOKIE_OUT="$token_dir/refresh" \
          E2E_M4_REVOCABLE_TOKEN_OUT="$token_dir/revocable" \
          E2E_MAIL_FIXTURE_URL=http://127.0.0.1:8025/view/latest.txt make e2e
          M4_E2E_ACCESS_TOKEN_FILE="$token_dir/access" make m4-performance-smoke
          M4_E2E_ACCESS_TOKEN_FILE="$token_dir/access" \
          M4_E2E_REFRESH_COOKIE_FILE="$token_dir/refresh" make m4-soak
      - name: Show container state and logs
        if: failure()
        run: docker compose --profile m4-ha ps --all
      - name: Tear down stack
        if: always()
        run: docker compose --profile m4-ha down -v
