name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Install protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make fmt-check vet lint test test-race vuln proto-check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Install protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Create ephemeral local configuration
        run: |
          cp .env.example .env
          make --silent keygen >> .env
          make dev-certs
      - name: Start the local stack
        run: docker compose up -d --build
      - name: Wait for Edge readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://localhost:8080/readyz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Run black-box tests
        run: make e2e
      - name: Collect service logs
        if: failure()
        run: docker compose logs
      - name: Tear down stack
        if: always()
        run: docker compose down -v
