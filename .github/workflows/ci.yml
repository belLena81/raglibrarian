name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.5.0
        with:
          go-version: '1.26.5'
          cache: true
      - name: Install pinned Go and protobuf tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Install pinned golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          install-only: true
      - name: Run Go quality gates
        run: make fmt-check vet lint test test-race arch-check vuln proto-check

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive
          token: ${{ secrets.UI_SUBMODULE_READ_TOKEN }}
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build, lint, and type-check UI
        run: make ui-check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.UI_SUBMODULE_READ_TOKEN }}
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies for dependency audit
        run: npm --prefix ui ci
      - name: Scan repository, Dockerfile, and service images
        run: make security-check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.5.0
        with:
          go-version: '1.26.5'
      - name: Install pinned protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Create ephemeral file-backed local configuration
        run: |
          cp .env.example .env
          make dev-secrets dev-certs
          umask 077
          openssl rand -base64 24 | tr -d '\n' > .dev/secrets/e2e_bootstrap_code
          { printf 'raglibrarian/admin-bootstrap/v1\0'; cat .dev/secrets/e2e_bootstrap_code; } \
            | openssl dgst -sha256 -binary > .dev/secrets/identity_bootstrap_verifier
          chmod 400 .dev/secrets/e2e_bootstrap_code .dev/secrets/identity_bootstrap_verifier
      - name: Validate and start the local stack
        run: |
          make compose-config
          docker compose up -d --build --wait --wait-timeout 180
      - name: Run live mTLS service contracts
        run: make contract-test
      - name: Run black-box tests
        run: |
          E2E_BOOTSTRAP_CODE="$(cat .dev/secrets/e2e_bootstrap_code)" \
          E2E_MAIL_FIXTURE_URL=http://127.0.0.1:8025/view/latest.txt \
            make e2e
      - name: Verify database-loss readiness behavior
        run: |
          docker compose stop postgres
          for attempt in $(seq 1 30); do
            ready_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/readyz)
            live_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/healthz)
            if [ "$ready_status" = "503" ] && [ "$live_status" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Show container state
        if: failure()
        run: docker compose ps --all
      - name: Tear down stack
        if: always()
        run: docker compose down -v
