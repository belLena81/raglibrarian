name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make fmt-check vet lint test test-race vuln proto-check
