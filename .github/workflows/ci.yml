name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
      - name: Install protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.71.0'
          input: api/proto
          lint: true
          push: false
          pr_comment: false
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          install-only: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make fmt-check vet lint test test-race arch-check vuln proto-check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
      - name: Install protobuf generators
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Create ephemeral local configuration
        run: |
          cp .env.example .env
          make --silent keygen >> .env
          make dev-certs
      - name: Start the local stack
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Run live mTLS service contracts
        run: make contract-test
      - name: Run black-box tests
        run: make e2e
      - name: Verify database-loss readiness behavior
        run: |
          docker compose stop postgres
          for attempt in $(seq 1 30); do
            ready_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/readyz)
            live_status=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/healthz)
            if [ "$ready_status" = "503" ] && [ "$live_status" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Collect service logs
        if: failure()
        run: docker compose logs
      - name: Tear down stack
        if: always()
        run: docker compose down -v
