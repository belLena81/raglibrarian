version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - "/pkg/auth"
      - "/pkg/config"
      - "/pkg/domain"
      - "/pkg/logger"
      - "/pkg/proto"
      - "/services/catalog-service"
      - "/services/edge-api"
      - "/services/identity-service"
      - "/tests/e2e"
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: "/ui"
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
