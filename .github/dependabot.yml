version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - "/pkg/auth"
      - "/pkg/grpcauth"
      - "/pkg/internaltls"
      - "/pkg/logger"
      - "/pkg/process"
      - "/pkg/proto"
      - "/services/catalog-service"
      - "/services/edge-api"
      - "/services/identity-service"
      - "/tests/e2e"
      - "/tools/healthcheck"
    schedule: { interval: weekly }
    groups:
      workspace-dependencies:
        patterns:
          - "*"
        group-by: dependency-name
  - package-ecosystem: npm
    directory: "/ui"
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
