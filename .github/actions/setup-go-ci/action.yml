name: Setup Go CI tools
description: Install Go and pinned Go/protobuf tools with a versioned binary cache.

inputs:
  install-buf:
    description: Install buf for proto lint and breaking checks.
    required: false
    default: "false"
  install-govulncheck:
    description: Install govulncheck for vulnerability scanning.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v7.0.0
      with:
        go-version: '1.26.5'
        cache: true

    - name: Restore pinned Go tool cache
      uses: actions/cache@v4
      with:
        path: ~/.local/share/raglibrarian-ci-go-tools
        key: raglibrarian-ci-go-tools-${{ runner.os }}-go1.26.5-buf1.71.0-protoc-gen-go1.36.10-protoc-gen-go-grpc1.5.1-govulncheck1.1.4

    - name: Install protobuf compiler and pinned Go tools
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install --yes protobuf-compiler

        tool_dir="$HOME/.local/share/raglibrarian-ci-go-tools/bin"
        mkdir -p "$tool_dir"
        echo "$tool_dir" >> "$GITHUB_PATH"

        install_go_tool() {
          local binary="$1"
          local package="$2"

          if [ ! -x "$tool_dir/$binary" ]; then
            GOBIN="$tool_dir" go install "$package"
          fi
        }

        install_go_tool protoc-gen-go google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
        install_go_tool protoc-gen-go-grpc google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

        if [ "${{ inputs.install-buf }}" = "true" ]; then
          install_go_tool buf github.com/bufbuild/buf/cmd/buf@v1.71.0
        fi

        if [ "${{ inputs.install-govulncheck }}" = "true" ]; then
          install_go_tool govulncheck golang.org/x/vuln/cmd/govulncheck@v1.1.4
        fi
