syntax = "proto3";

package catalog.v1;

option go_package = "github.com/belLena81/raglibrarian/pkg/proto/catalog/v1;catalogv1";

import "google/protobuf/timestamp.proto";

service CatalogService {
  rpc Check(CheckRequest) returns (CheckResponse);
  rpc UploadBook(stream UploadBookRequest) returns (UploadBookResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
  rpc ReindexBook(ReindexBookRequest) returns (ReindexBookResponse);
  rpc DeleteBook(DeleteBookRequest) returns (DeleteBookResponse);
}

message CheckRequest {}

message CheckResponse {
  string status = 1;
}

message UploadBookRequest {
  oneof frame {
    UploadBookMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message UploadBookMetadata {
  string title = 1;
  string author = 2;
  int32 year = 3;
  repeated string tags = 4;
  string actor_id = 5 [deprecated = true];
  string correlation_id = 6;
  Actor actor = 7;
  string media_type = 8;
}

message UploadBookResponse { Book book = 1; }

message ListBooksRequest {
  int32 page_size = 1;
  string page_token = 2;
  Actor actor = 3;
}

message ListBooksResponse {
  repeated Book books = 1;
  string next_page_token = 2;
}

message GetBookRequest {
  string book_id = 1;
  Actor actor = 2;
}
message GetBookResponse { Book book = 1; }

message ReindexBookRequest {
  string book_id = 1;
  Actor actor = 2;
  string command_id = 3;
}

message ReindexBookResponse { Book book = 1; }

message DeleteBookRequest {
  string book_id = 1;
  Actor actor = 2;
  string command_id = 3;
}

message DeleteBookResponse { Book book = 1; }

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  int32 year = 4;
  repeated string tags = 5;
  string processing_status = 6;
  google.protobuf.Timestamp created_at = 7;
  string processing_stage = 8;
  string processing_failure_category = 9;
  google.protobuf.Timestamp processing_updated_at = 10;
  int64 processing_version = 11;
  string media_type = 12;
  int64 lifecycle_version = 13;
  bool can_reindex = 14;
}

// Actor is asserted by the authenticated Edge service, never by a browser.
message Actor {
  string user_id = 1;
  string role = 2;
  string status = 3;
  // masked_email is diagnostic-only. Catalog never uses it for authorization
  // and does not copy it into emitted domain events.
  string masked_email = 4;
}

message BookUploadedV1 {
  string event_id = 1;
  string book_id = 2;
  string title = 3;
  string author = 4;
  int32 year = 5;
  repeated string tags = 6;
  string object_reference = 7;
  bytes sha256 = 8;
  int64 byte_size = 9;
  string media_type = 10;
  string actor_id = 11;
  string correlation_id = 12;
  google.protobuf.Timestamp occurred_at = 13;
  string causation_id = 14;
  string producer = 15;
  string schema_version = 16;
  string idempotency_key = 17;
  int64 lifecycle_version = 18;
}

// BookProcessingStatusChangedV1 is Catalog's sanitized, authoritative
// notification projection. It contains no book content or storage references.
message BookProcessingStatusChangedV1 {
  string event_id = 1;
  string book_id = 2;
  string processing_status = 3;
  string processing_stage = 4;
  string processing_failure_category = 5;
  int64 processing_version = 6;
  google.protobuf.Timestamp updated_at = 7;
  string correlation_id = 8;
  google.protobuf.Timestamp occurred_at = 9;
  string causation_id = 10;
  string producer = 11;
  string schema_version = 12;
  string idempotency_key = 13;
  int64 lifecycle_version = 14;
  bool can_reindex = 15;
}

// BookReindexRequestedV1 schedules a vector-only replacement from Catalog's
// last validated chunk manifest. lifecycle_version fences stale generations.
message BookReindexRequestedV1 {
  string event_id = 1;
  string book_id = 2;
  string command_id = 3;
  int64 lifecycle_version = 4;
  bytes source_sha256 = 5;
  string manifest_reference = 6;
  bytes manifest_sha256 = 7;
  string actor_id = 8;
  string correlation_id = 9;
  google.protobuf.Timestamp occurred_at = 10;
  string causation_id = 11;
  string producer = 12;
  string schema_version = 13;
  string idempotency_key = 14;
}

// BookDeletionRequestedV1 asks owning services to remove their artifacts.
// Catalog finalizes the tombstone only after both cleanup acknowledgements.
message BookDeletionRequestedV1 {
  string event_id = 1;
  string book_id = 2;
  string command_id = 3;
  int64 lifecycle_version = 4;
  string actor_id = 5;
  string correlation_id = 6;
  google.protobuf.Timestamp occurred_at = 7;
  string causation_id = 8;
  string producer = 9;
  string schema_version = 10;
  string idempotency_key = 11;
}
